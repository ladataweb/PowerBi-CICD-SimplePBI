name: SimplePBI-Ops-Deploy

on:
  push:
    branches:
      - dev
    paths:
      - 'Workspaces/**'  # Trigger only when there's a change in this folder

jobs:
  SimplePBI-Ops-Dev-Deploy:
    runs-on: ubuntu-latest
    
    # Set your prefiex target for environment workspace. If your folder name is Workspace Sales and the dev environment workspace is Workspace Sales - Dev, write " - Dev" value for the variable
    env:
      DEPLOY_ENV: "_Dev"

    steps:
      # Step 1: Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
         fetch-depth: 3

      # Step 2: Set up Python environment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Step 3: Install the necessary Python package from PyPI
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install simplepbi 

      # Step 4: Get list of changed folders ending with .report or .semanticmodel
      - name: Get changed folders
        id: detect_changes
        run: |
            set -e

            # Use the GitHub SHA context
            # Note: This assumes a push event; for PRs use ${{ github.event.pull_request.base.sha }}
            changed_files=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- Reports/ || echo "")

            declare -A changed_folders_map

            while IFS= read -r file; do
                [ -z "$file" ] && continue
                [[ "$file" =~ \.pbip$ ]] && continue

                if [[ "$file" == *".SemanticModel"* ]]; then
                    folder="${file%%.SemanticModel*}.SemanticModel"
                    changed_folders_map["$folder"]=1
                elif [[ "$file" == *".Report"* ]]; then
                    folder="${file%%.Report*}.Report"
                    changed_folders_map["$folder"]=1
                fi
            done <<< "$changed_files"

            existing_folders=$(IFS=, ; echo "${!changed_folders_map[*]}")

            echo "Changed folders: $existing_folders"

            # Set GitHub Actions output (modern replacement for set-env/vso task variables)
            echo "changed_folders=$existing_folders" >> $GITHUB_OUTPUT

      # Step 5: Run the Python script with the list of changed folders and secret key
      - name: Run Python script
        run: python ldw-deploy.py "ldw-key" "${DEPLOY_ENV}" ${{ secrets.TENANT_ID }} ${{ secrets.APP_ID }} ${{ secrets.SECRET_KEY }} ${{ env.changed_folders }} 
